name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit + integration tests
        run: cargo test --all --locked
      - name: Release build
        run: cargo build --release --locked

  # Windows: verify the crate compiles. Tests stay on Unix because the dynamic
  # detector and its fixtures shell out to `sh` (the static-review core, the
  # product's default mode, is fully cross-platform).
  build-windows:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked

  lint:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings
      # Note: the codebase uses a deliberate wide hand-formatting style, so we do
      # NOT gate on `cargo fmt --check`. Style is enforced semantically by clippy.

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Check on the minimum supported Rust version
        run: cargo check --all-targets --locked

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit advisories, bans, licenses, sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
